{% extends 'base.html' %}{% block content %}<header class="top"><div><p class="eyebrow">HEALTH · GAIN WITH INTENTION</p><h1>Weight tracker.</h1><p class="muted">A calm, honest view of your progress.</p></div></header><section class="tracker-layout"><form class="panel form-card" method="post"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><h2>Today's check-in</h2><label>Current weight (kg)<input name="weight" type="number" step="0.1" required></label><label>Target weight (kg)<input name="target_weight" type="number" step="0.1" value="{{ current_user.target_weight }}"></label><button class="primary">Save check-in</button></form><article class="panel"><p class="eyebrow">YOUR TREND</p><h2>{% if logs %}{{ logs[-1].weight }} kg{% else %}No check-ins yet{% endif %}</h2><canvas id="weightChart" data-labels='{{ logs|map(attribute="logged_on")|map("string")|list|tojson }}' data-values='{{ logs|map(attribute="weight")|list|tojson }}'></canvas></article></section>{% endblock %}
