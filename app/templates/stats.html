{% extends 'base.html' %}{% block content %}<header class="top"><div><p class="eyebrow">SIGNALS, NOT NOISE</p><h1>Your progress story.</h1><p class="muted">Consistency compounds quietly.</p></div></header><section class="stat-panels"><article class="panel"><p class="eyebrow">HABIT COMPLETION</p><h2>Last 7 days</h2><canvas id="completionChart" data-labels='{{ labels|tojson }}' data-values='{{ values|tojson }}'></canvas></article><article class="panel"><p class="eyebrow">STUDY HOURS</p><h2>Last 7 days</h2><canvas id="studyChart" data-labels='{{ labels|tojson }}' data-values='{{ study|tojson }}'></canvas></article></section><article class="panel heat-panel"><p class="eyebrow">CONSISTENCY MAP</p><h2>Every day leaves a mark.</h2><div class="heatmap">{% for cell in heatmap %}<span title="{{ cell.date }} · {{ cell.percent }}%" data-level="{{ 0 if cell.percent == 0 else (1 if cell.percent < 40 else (2 if cell.percent < 70 else 3)) }}"></span>{% endfor %}</div><div class="legend">Less <i data-level="0"></i><i data-level="1"></i><i data-level="2"></i><i data-level="3"></i> More</div></article>{% endblock %}
