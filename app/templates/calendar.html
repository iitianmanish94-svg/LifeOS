{% extends 'base.html' %}{% block content %}<header class="top"><div><p class="eyebrow">CONSISTENCY CALENDAR</p><h1>Show up. Mark it green.</h1><p class="muted">Your last 12 weeks at a glance.</p></div></header><article class="panel heat-panel big"><div class="panel-title"><div><p class="eyebrow">GITHUB-STYLE HEATMAP</p><h2>Momentum over intensity.</h2></div><span class="pill">Today: {{ summary.percent }}%</span></div><div class="heatmap">{% for cell in heatmap %}<span title="{{ cell.date }} · {{ cell.percent }}%" data-level="{{ 0 if cell.percent == 0 else (1 if cell.percent < 40 else (2 if cell.percent < 70 else 3)) }}"></span>{% endfor %}</div><div class="legend">Missed <i data-level="0"></i><i data-level="1"></i><i data-level="2"></i><i data-level="3"></i> Perfect day</div></article>{% endblock %}
